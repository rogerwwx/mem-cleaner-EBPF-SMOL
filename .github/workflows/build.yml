name: Build Android eBPF Binary

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Cache Cargo + Target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Install Stable Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install Nightly Toolchain for eBPF
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Install Cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build eBPF Kernel Program
        run: |
          cd mem_cleaner_ebpf
          RUSTFLAGS="-C linker=bpf-linker" cargo +nightly build \
            --target bpfel-unknown-none \
            -Z build-std=core \
            --release

      - name: Copy eBPF Object to Src
        run: |
          cp target/bpfel-unknown-none/release/mem_cleaner_ebpf mem_cleaner/src/mem_cleaner_ebpf.o

      - name: Build User-space Daemon
        run: cross +stable build --target aarch64-linux-android -p mem_cleaner --release

      - name: Package Binary
        run: |
          mkdir -p output
          cp target/aarch64-linux-android/release/mem_cleaner output/mem_cleaner

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mem_cleaner_arm64
          path: output/mem_cleaner
